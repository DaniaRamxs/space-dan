<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Autenticando · Spacely</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- NOTA: El meta-refresh dinámico se añade por JS más abajo, porque no
       conocemos el code sin ejecutar el script. Pero dejamos también
       el disparo automático vía script + Intent URL fallback. -->

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #060d1f;
      color: #67e8f9;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 360px; }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(103, 232, 249, 0.15);
      border-top-color: #67e8f9;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }
    p { font-size: 14px; opacity: 0.8; margin: 8px 0; }
    .openBtn {
      display: block;
      margin: 32px auto 0;
      padding: 16px 32px;
      background: #67e8f9;
      color: #060d1f;
      text-decoration: none;
      border: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(103,232,249,0.25);
      width: 100%;
      max-width: 280px;
    }
    .openBtn:active { transform: scale(0.98); }
    .fallback { margin-top: 32px; font-size: 11px; opacity: 0.4; }
    #errorBox {
      display: none;
      margin-top: 24px;
      padding: 12px 16px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px;
      color: #f87171;
      font-size: 12px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Autenticando</h1>
    <p id="status">Abriendo Spacely…</p>

    <!-- Botón grande: el usuario lo toca si el auto-redirect no funciona.
         Esto SIEMPRE funciona porque es un click real del usuario. -->
    <a id="openApp" class="openBtn" href="#">Abrir Spacely</a>

    <div class="fallback">
      Si no se abre automáticamente, toca el botón de arriba.
    </div>

    <div id="errorBox"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var isNative = params.get('native') === '1';
      var code = params.get('code');
      var errorParam = params.get('error') || params.get('error_description');
      var hash = window.location.hash || '';

      // Si Supabase reportó un error, lo mostramos y paramos.
      if (errorParam) {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Error de autenticación';
        var eb = document.getElementById('errorBox');
        eb.style.display = 'block';
        eb.textContent = decodeURIComponent(errorParam);
        return;
      }

      // Construir query preservando todos los parámetros
      var qs = [];
      if (code) qs.push('code=' + encodeURIComponent(code));
      params.forEach(function (v, k) {
        if (k !== 'code' && k !== 'native') qs.push(k + '=' + encodeURIComponent(v));
      });
      var qsStr = qs.length ? '?' + qs.join('&') : '';

      var deepLink = 'com.dan.space://auth' + qsStr + hash;
      // Intent URL de Android (más agresivo, fuerza al OS a resolverlo)
      var intentUrl = 'intent://auth' + qsStr + hash +
        '#Intent;scheme=com.dan.space;package=com.dan.space;end';

      // Botón visible (click manual) — siempre funciona
      var btn = document.getElementById('openApp');
      btn.href = deepLink;

      // Inyectar meta-refresh con el deep link (funciona en algunos WebViews
      // donde window.location falla)
      var meta = document.createElement('meta');
      meta.httpEquiv = 'refresh';
      meta.content = '0; url=' + deepLink;
      document.head.appendChild(meta);

      if (isNative) {
        // Detectar si esta página está corriendo DENTRO del WebView de la app.
        // El UA del WebView de Capacitor/Android típicamente contiene "; wv)"
        // o "Capacitor". Si estamos ahí, PKCE state se preserva al navegar
        // directamente al WebView de nuestra app en localhost.
        //
        // IMPORTANTE: ahora el OAuth se inicia navegando el WebView (no
        // Chrome externo), por lo que cuando esta bridge carga, estamos
        // dentro del WebView. Aquí solo necesitamos "saltar" de
        // joinspacely.com/auth-bridge.html a localhost/#/auth/callback para
        // que React Router intercepte.
        var isInWebView = /wv\)/i.test(navigator.userAgent) ||
          /Capacitor/i.test(navigator.userAgent);

        // Intento A: Si estamos en WebView, saltar al callback interno.
        // Usamos protocolo + host relativo para que funcione tanto con
        // androidScheme=https como con http.
        if (isInWebView) {
          btn.textContent = 'Completando…';
          setTimeout(function () {
            try {
              // Navegar al WebView de la app (https://localhost/)
              window.location.href = 'https://localhost/#/auth/callback' + qsStr + hash;
            } catch (e) {}
          }, 100);
          // También intentar deep link como redundancia
          setTimeout(function () {
            try { window.location.href = deepLink; } catch (e) {}
          }, 1000);
          return;
        }

        // Intento B: iframe oculto con src al deep link (bypass de algunos bloqueos)
        var iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = deepLink;
        document.body.appendChild(iframe);

        // Intento C (500ms): window.location al deep link
        setTimeout(function () {
          try { window.location.href = deepLink; } catch (e) {}
        }, 500);

        // Intento D (1.5s): Intent URL (más agresivo)
        setTimeout(function () {
          try { window.location.href = intentUrl; } catch (e) {}
        }, 1500);

        // Intento E (3s): simular click programático
        setTimeout(function () {
          try {
            btn.click();
            document.getElementById('status').textContent =
              'Si nada sucede, toca el botón manualmente.';
          } catch (e) {}
        }, 3000);

        // Intento F (5s): mensaje explícito
        setTimeout(function () {
          document.querySelector('.spinner').style.display = 'none';
          document.getElementById('status').textContent =
            '¿No se abrió Spacely? Tócalo abajo:';
        }, 5000);
      } else {
        // No es nativo → volvemos a la home tras un breve instante
        setTimeout(function () {
          window.location.href = '/';
        }, 800);
      }
    })();
  </script>
</body>
</html>
