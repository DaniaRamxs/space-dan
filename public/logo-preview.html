<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Logo Preview</title>
  <style>
    body { margin: 0; background: #0a1628; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; }
  </style>
</head>
<body>
  <!-- Logo completo con texto -->
  <svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="brandGradient" x1="0%" y1="50%" x2="100%" y2="50%">
        <stop offset="0%" stop-color="#4B76F7" />
        <stop offset="100%" stop-color="#3ED9ED" />
      </linearGradient>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </defs>
    <g transform="translate(50, 50)">
      <path d="M190 40 L160 160 M190 40 L90 70 M160 160 L90 70 M90 70 L50 110 M160 160 L50 110" 
            stroke="url(#brandGradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <path d="M22 135 C 25 180, 100 170, 195 45 C 130 110, 50 160, 22 135 Z" fill="url(#brandGradient)"/>
      <path d="M22 135 C 15 110, 40 100, 65 105" stroke="url(#brandGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="190" cy="40" r="14" fill="url(#brandGradient)" filter="url(#glow)"/>
      <circle cx="160" cy="160" r="11" fill="url(#brandGradient)" filter="url(#glow)"/>
      <circle cx="90" cy="70" r="10" fill="url(#brandGradient)" filter="url(#glow)"/>
      <circle cx="50" cy="110" r="7" fill="url(#brandGradient)" filter="url(#glow)"/>
    </g>
    <text x="280" y="175" fill="url(#brandGradient)" style="font-family: Arial, sans-serif; font-weight: 800; font-size: 110px; letter-spacing: -2px;">Spacely</text>
  </svg>

  <!-- Solo el ícono -->
  <svg width="200" height="200" viewBox="0 0 250 210" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="brandGradient2" x1="0%" y1="50%" x2="100%" y2="50%">
        <stop offset="0%" stop-color="#4B76F7" />
        <stop offset="100%" stop-color="#3ED9ED" />
      </linearGradient>
      <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </defs>
    <g transform="translate(30, 20)">
      <path d="M190 40 L160 160 M190 40 L90 70 M160 160 L90 70 M90 70 L50 110 M160 160 L50 110" 
            stroke="url(#brandGradient2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <path d="M22 135 C 25 180, 100 170, 195 45 C 130 110, 50 160, 22 135 Z" fill="url(#brandGradient2)"/>
      <path d="M22 135 C 15 110, 40 100, 65 105" stroke="url(#brandGradient2)" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="190" cy="40" r="14" fill="url(#brandGradient2)" filter="url(#glow2)"/>
      <circle cx="160" cy="160" r="11" fill="url(#brandGradient2)" filter="url(#glow2)"/>
      <circle cx="90" cy="70" r="10" fill="url(#brandGradient2)" filter="url(#glow2)"/>
      <circle cx="50" cy="110" r="7" fill="url(#brandGradient2)" filter="url(#glow2)"/>
    </g>
  </svg>
</body>
</html>
