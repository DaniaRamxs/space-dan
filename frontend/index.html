<!doctype html>

<html lang="es">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- App identity -->
  <title>Spacely</title>
  <!-- Performance Polyfill for React Scheduler -->
  <script>
    if (!window.performance) {
      window.performance = {};
    }
    if (!window.performance.now) {
      window.performance.now = function() {
        return Date.now();
      };
    }
    if (!window.performance.unstable_now) {
      window.performance.unstable_now = function() {
        return Date.now();
      };
    }
  </script>
  <meta name="description" content="Spacely — Comunidad galáctica interactiva" />

  <!-- PWA / mobile -->
  <meta name="theme-color" content="#050510" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spacely" />

  <!-- Favicon - Tauri Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png" />
  <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128x128.png" />
  <link rel="shortcut icon" href="/favicon.png" />

  <!-- Preconnect: TCP/TLS a Supabase antes de que cargue el JS -->
  <link rel="preconnect" href="https://dwhobtphhacmoogullxk.supabase.co" crossorigin />
  <link rel="dns-prefetch" href="https://dwhobtphhacmoogullxk.supabase.co" />

  <!-- Preconnect para avatares de DiceBear (HyperBot y avatares generados) -->
  <link rel="dns-prefetch" href="https://api.dicebear.com" />

  <!-- Previene FOUC en temas: aplica fondo oscuro antes de que cargue CSS -->
  <style>
    html, body { background: #050510; }
  </style>

</head>

<body>
  <div id="error-log" style="position:fixed;z-index:999999;top:0;left:0;background:red;color:white;font-size:12px;padding:10px;white-space:pre-wrap;display:none;max-height:100vh;overflow:auto;width:100%;"></div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.getElementById('error-log').style.display = 'block';
      document.getElementById('error-log').innerText += 'ERROR: ' + msg + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      document.getElementById('error-log').style.display = 'block';
      document.getElementById('error-log').innerText += 'PROMISE ERROR: ' + (event.reason ? event.reason.stack || event.reason : 'Unknown') + '\n\n';
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
